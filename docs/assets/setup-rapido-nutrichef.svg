<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Setup rßpido de NutriChef IA</title>
  <desc id="desc">GuÝa visual para instalaciˇn, entorno y ejecuciˇn local.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .head { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .code { font: 600 19px Consolas, "Courier New", monospace; fill: #0f172a; }
      .note { font: 500 17px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="50" y="60">Setup rßpido de NutriChef IA</text>

  <rect x="50" y="110" width="340" height="360" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text class="head" x="80" y="155">1. Instalar dependencias</text>
  <rect x="80" y="190" width="280" height="70" rx="10" fill="#ffffff"/>
  <text class="code" x="98" y="233">npm install</text>
  <text class="note" x="80" y="300">Descarga librerÝas de</text>
  <text class="note" x="80" y="328">frontend y backend.</text>

  <rect x="430" y="110" width="340" height="360" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text class="head" x="460" y="155">2. Configurar entorno</text>
  <rect x="460" y="190" width="280" height="70" rx="10" fill="#ffffff"/>
  <text class="code" x="478" y="233">cp .env.example .env</text>
  <text class="note" x="460" y="290">Completar:</text>
  <text class="note" x="460" y="318">GEMINI_API_KEY</text>
  <text class="note" x="460" y="344">VITE_FIREBASE_*</text>

  <rect x="810" y="110" width="340" height="360" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text class="head" x="840" y="155">3. Ejecutar en local</text>
  <rect x="840" y="190" width="280" height="70" rx="10" fill="#ffffff"/>
  <text class="code" x="858" y="233">npm run dev</text>
  <text class="note" x="840" y="300">Levanta frontend + backend</text>
  <text class="note" x="840" y="328">en modo desarrollo.</text>

  <rect x="50" y="520" width="1100" height="120" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text class="head" x="80" y="566">Producciˇn</text>
  <text class="code" x="80" y="608">npm run build  &amp;&amp;  npm run start</text>
</svg>
