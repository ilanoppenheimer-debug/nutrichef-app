<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Flujo principal de usuario</title>
  <desc id="desc">Flujo en seis pasos para el uso principal de NutriChef IA.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 36px Arial, sans-serif; fill: #0f172a; }
      .stepTitle { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .stepText { font: 500 18px Arial, sans-serif; fill: #334155; }
      .num { font: 700 24px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="50" y="65">Flujo principal de usuario</text>

  <g transform="translate(60,120)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#2563eb"/><text class="num" x="34" y="50">1</text>
    <text class="stepTitle" x="80" y="48">Completar perfil</text>
    <text class="stepText" x="28" y="92">Datos nutricionales,</text>
    <text class="stepText" x="28" y="120">preferencias y restricciones.</text>
  </g>

  <g transform="translate(430,120)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#16a34a"/><text class="num" x="34" y="50">2</text>
    <text class="stepTitle" x="80" y="48">Elegir objetivo</text>
    <text class="stepText" x="28" y="92">Déficit, superávit</text>
    <text class="stepText" x="28" y="120">o mantención.</text>
  </g>

  <g transform="translate(800,120)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#ea580c"/><text class="num" x="34" y="50">3</text>
    <text class="stepTitle" x="80" y="48">Generar receta IA</text>
    <text class="stepText" x="28" y="92">Gemini entrega receta</text>
    <text class="stepText" x="28" y="120">adaptada al perfil.</text>
  </g>

  <g transform="translate(60,430)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#0369a1"/><text class="num" x="34" y="50">4</text>
    <text class="stepTitle" x="80" y="48">Ajustar receta</text>
    <text class="stepText" x="28" y="92">Quitar ingredientes,</text>
    <text class="stepText" x="28" y="120">sustituir y refinar.</text>
  </g>

  <g transform="translate(430,430)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#6d28d9"/><text class="num" x="34" y="50">5</text>
    <text class="stepTitle" x="80" y="48">Plan semanal</text>
    <text class="stepText" x="28" y="92">Organizar comidas</text>
    <text class="stepText" x="28" y="120">por día y objetivo.</text>
  </g>

  <g transform="translate(800,430)">
    <rect x="0" y="0" width="340" height="170" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <circle cx="42" cy="42" r="24" fill="#b45309"/><text class="num" x="34" y="50">6</text>
    <text class="stepTitle" x="80" y="48">Lista de compras</text>
    <text class="stepText" x="28" y="92">Con estimación</text>
    <text class="stepText" x="28" y="120">de costos.</text>
  </g>

  <line class="arrow" x1="400" y1="205" x2="430" y2="205"/>
  <line class="arrow" x1="770" y1="205" x2="800" y2="205"/>
  <line class="arrow" x1="970" y1="290" x2="970" y2="430"/>
  <line class="arrow" x1="800" y1="515" x2="770" y2="515"/>
  <line class="arrow" x1="430" y1="515" x2="400" y2="515"/>
</svg>
